name: Build and Push Docker Images

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'packages/**'
      - '.github/workflows/build-and-push-images.yml'

env:
  # 使用 GitHub Secrets 配置私有仓库
  # 在仓库设置中添加以下 secrets:
  # - DOCKER_REGISTRY: 你的镜像仓库地址
  # - DOCKER_USERNAME: 仓库用户名
  # - DOCKER_PASSWORD: 仓库密码
  REGISTRY: ${{ secrets.DOCKER_REGISTRY || 'ghcr.io' }}
  IMAGE_PREFIX: ${{ secrets.DOCKER_IMAGE_PREFIX || 'your-org' }}

jobs:
  build-hermes-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME || github.actor }}
          password: ${{ secrets.DOCKER_PASSWORD || secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Hermes Agent
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./packages/hermes-agent/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/hermes-agent:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/hermes-agent:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-open-webui:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME || github.actor }}
          password: ${{ secrets.DOCKER_PASSWORD || secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Open WebUI
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./packages/open-webui/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/open-webui:main
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/open-webui:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
